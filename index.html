        .nav-tools { display: flex; gap: 10px; }
        .btn { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .btn-compare { background: #e67e22; }
        
        .controls { background: white; padding: 12px; border-bottom: 1px solid #ddd; display: flex; justify-content: center; gap: 20px; align-items: center; }
        .hidden { display: none !important; }
        
        .main-viewer { flex-grow: 1; display: flex; width: 100%; background: #fff; }
        iframe { border: none; width: 100%; height: 100%; }
        
        .compare-mode iframe { width: 50%; border-right: 2px solid #f4f7f9; }
        .compare-mode iframe:last-child { border-right: none; }

        /* --- Estilos del Pie de Página --- */
        footer { 
            background: #2c3e50; 
            color: #ecf0f1; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.9em;
            border-top: 3px solid #3498db;
        }
        footer p { margin: 5px 0; }
        footer a { color: #3498db; text-decoration: none; font-weight: bold; }
        footer a:hover { text-decoration: underline; }
    </style>

<script>
    function toggleView(mode) {
        const ctrlSingle = document.getElementById('controls-single');
        const ctrlCompare = document.getElementById('controls-compare');
        const viewer = document.getElementById('viewer');
        const v2 = document.getElementById('v2');

        if (mode === 'compare') {
            ctrlSingle.classList.add('hidden');
            ctrlCompare.classList.remove('hidden');
            viewer.classList.add('compare-mode');
            v2.classList.remove('hidden');
        } else {
            ctrlSingle.classList.remove('hidden');
            ctrlCompare.classList.add('hidden');
            viewer.classList.remove('compare-mode');
            v2.classList.add('hidden');
        }
        window.dispatchEvent(new Event('resize'));
    }
</script>
